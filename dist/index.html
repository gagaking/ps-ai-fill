<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PS AI Fill</title>
<script>
(function(){
// ===== 1. Tab DOM swap =====
var _t=setInterval(function(){
 var g=document.getElementById("tab-btn-gallery");
 var e=document.getElementById("tab-btn-extend");
 if(g&&e&&g.parentNode&&g.parentNode.contains(e)){
  g.parentNode.insertBefore(e,g);
  clearInterval(_t);
 }
},200);

// ===== 2. Pin button =====
function _pin(){
 var tb=document.querySelector("[style*='no-drag']");
 if(!tb||tb.querySelector(".ps-pin"))return;
 var p=document.createElement("button");
 p.className="ps-pin w-[38px] h-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-blue-600/60 transition-colors cursor-pointer border-0 outline-none";
 p.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="18"/><line x1="8" y1="18" x2="16" y2="18"/></svg>';
 p.title="置顶: ON";
 p.onclick=function(){
  if(window.electronAPI&&window.electronAPI.toggleAlwaysOnTop)
   window.electronAPI.toggleAlwaysOnTop().then(function(v){p.style.opacity=v?"1":"0.3";p.title=v?"置顶: ON":"置顶: OFF";});
 };
 tb.insertBefore(p,tb.firstChild);
 if(window.electronAPI&&window.electronAPI.getAlwaysOnTop)
  window.electronAPI.getAlwaysOnTop().then(function(v){p.style.opacity=v?"1":"0.3";p.title=v?"置顶: ON":"置顶: OFF";});
 if(window.electronAPI&&window.electronAPI.onAlwaysOnTopChanged)
  window.electronAPI.onAlwaysOnTopChanged(function(v){p.style.opacity=v?"1":"0.3";p.title=v?"置顶: ON":"置顶: OFF";});
}
var _mo=new MutationObserver(function(){_pin();});
_mo.observe(document.body||document.documentElement,{childList:true,subtree:true});
_pin();

// ===== 3. Hide 0/0 counter =====
var _cc=setInterval(function(){
 var spans=document.querySelectorAll("span");
 for(var i=0;i<spans.length;i++){
  if(spans[i].textContent==="0/0"){
   var p=spans[i].closest("[class*='rounded-lg']");
   if(p&&p.style.display!=="none")p.style.display="none";
  }
 }
},200);

// ===== 4. Settings: download path + hide prefs =====
var _sp=setInterval(function(){
 var s=document.getElementById("tab-btn-settings");
 if(!s||s.className.indexOf("bg-white/10")===-1)return;
 var scroll=document.querySelector("[class*='overflow-y-auto']");
 if(!scroll||!scroll.children[0])return;
 var panel=scroll.children[0];
 // Hide prefs
 var all=panel.querySelectorAll("span,label");
 for(var i=0;i<all.length;i++){
  var t=all[i].textContent||"";
  if(t.indexOf("自动推荐")>-1||t.indexOf("活动选区")>-1){
   var p=all[i].closest("[class*='rounded-xl']");
   if(p&&p.style.display!=="none"){p.style.display="none";p.style.visibility="hidden";p.style.height="0";p.style.overflow="hidden";p.style.padding="0";p.style.margin="0";p.style.border="none";}
  }
 }
 // Inject download path
 if(!panel.querySelector(".ps-dl-path")){
  var grp=document.createElement("div");
  grp.className="ps-dl-path bg-white/5 rounded-xl p-3 border border-white/10 flex flex-col gap-2";
  grp.innerHTML="<span class='text-[10px] text-gray-400 font-semibold tracking-wide'>下载路径</span><div class='flex gap-2'><input type='text' class='ps-dl-path-input flex-1 bg-black/40 border border-white/10 rounded-lg px-2.5 py-1.5 text-[10px] text-white placeholder-gray-500 outline-none focus:border-blue-500/50' placeholder='C:\\Users\\...\\Downloads'><button class='ps-dl-path-save px-2.5 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold rounded-lg cursor-pointer'>Save</button></div>";
  panel.insertBefore(grp,panel.firstChild);
  var inp=grp.querySelector(".ps-dl-path-input");
  try{var sv=localStorage.getItem("ps_dl_path");if(sv)inp.value=sv;}catch(e){}
  grp.querySelector(".ps-dl-path-save").onclick=function(){
   var v=inp.value.trim();
   try{localStorage.setItem("ps_dl_path",v);}catch(e){}
   if(window.electronAPI&&window.electronAPI.setDownloadPath)window.electronAPI.setDownloadPath(v);
  };
 }

  // Inject cache path display
  if(!panel.querySelector(".ps-cache-path")){
   (function(){
    var cp=document.createElement("div");
    cp.className="ps-cache-path bg-white/5 rounded-xl p-3 border border-white/10 flex flex-col gap-2";
    cp.innerHTML="<span class='text-[10px] text-gray-400 font-semibold tracking-wide'>缓存目录</span><div class='flex items-center gap-2'><span class='ps-cache-path-text flex-1 bg-black/40 border border-white/10 rounded-lg px-2.5 py-1.5 text-[10px] text-gray-300 font-mono truncate' title='缓存目录路径'>正在加载...</span></div>";
    panel.insertBefore(cp,panel.firstChild);
    function loadCachePath(){
     var txt=cp.querySelector(".ps-cache-path-text");
     if(window.electronAPI&&window.electronAPI.getCachePath){
      window.electronAPI.getCachePath().then(function(p){
       txt.textContent=p;
       txt.title=p;
      });
     }
    }
    loadCachePath();
   })();
  }
},500);

// ===== 5. Gallery: bar + show images, hide details =====
var _gf=setInterval(function(){
 var g=document.getElementById("tab-btn-gallery");
 if(!g||g.className.indexOf("bg-white/10")===-1)return;
 var scroll=document.querySelector("[class*='overflow-y-auto']");
 if(!scroll||!scroll.children[0])return;
 var gc=scroll.children[0];
 // Hide detail text but KEEP IMAGES
 for(var c=0;c<gc.children.length;c++){
  var ch=gc.children[c];
  if(ch.classList&&ch.classList.contains("ps-gallery-bar"))continue;
  var hasImg=ch.querySelector("img")||ch.querySelector("[class*='grid']");
  if(!hasImg){ch.style.display="none";}
  else {
   ch.style.display="";
   var spans=ch.querySelectorAll("span,p,button");
   for(var si=0;si<spans.length;si++){
    var st=spans[si].textContent||"";
    if(spans[si].closest(".ps-gallery-bar"))continue;
    if(st.length<40&&(st.indexOf(":")>-1||st.match(/\d{1,2}:\d{2}/)||st.indexOf("Restore")>-1))spans[si].style.display="none";
   }
  }
 }
 // Add hover download on images
 var imgs=gc.querySelectorAll("img");
 for(var ii=0;ii<imgs.length;ii++){
  var img=imgs[ii];
  if(img.parentElement&&img.parentElement.querySelector(".ps-gal-dl"))continue;
  var parent=img.parentElement;
  if(window.getComputedStyle(parent).position==="static")parent.style.position="relative";
  parent.classList.add("group");
  var ov=document.createElement("div");
  ov.className="ps-gal-dl absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-black/80 flex items-center justify-center cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity z-10";
  ov.innerHTML="<svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4'/><polyline points='7 10 12 15 17 10'/><line x1='12' y1='15' x2='12' y2='3'/></svg>";
  ov.title="Download";
  ov.onclick=function(src){return function(e){e.stopPropagation();if(window.electronAPI&&window.electronAPI.downloadImage)window.electronAPI.downloadImage({url:src,filename:"gallery_image.png",downloadPath:""});};}(img.src);
  parent.appendChild(ov);
 }
},500);

// ===== 6. Download: POST proxy + IPC =====
window.fetch=(function(of){
 return function(i,init){
  var u=(typeof i==="string")?i:(i&&i.url)||"";
  if(u.indexOf("/api/ps/download")>-1&&init&&init.method==="POST"){
   try{var b=JSON.parse(init.body);if(b&&b.url&&window.electronAPI&&window.electronAPI.downloadImage)window.electronAPI.downloadImage({url:b.url,filename:b.filename||"image.png",downloadPath:""});}catch(e){}
  }

   // Auto-save generated images to cache
   if(u.indexOf("/api/ps/generate")>-1){
    try{
      var ob=JSON.parse(init.body);
      if(!ob.isExtend&&!ob.isOutpaint){
        var curSrc={},allImgs=document.querySelectorAll("img[src^=blob:]");
        for(var si=0;si<allImgs.length;si++){curSrc[allImgs[si].src]=true}
        var fresh=_u.filter(function(e){return curSrc[e.url]});
        if(fresh.length>=1&&!ob.ref_image_base64) ob.ref_image_base64=fresh[0].base64;
        if(fresh.length>=2&&!ob.style_image_base64) ob.style_image_base64=fresh[1].base64;

      }
      var nb=JSON.stringify(ob);
      init.body=nb;
    }catch(e){console.warn("[Ref Inject] failed:",e)}
    return of.apply(this,arguments).then(function(r){
     if(r.ok&&window.electronAPI&&window.electronAPI.saveToCache){
      r.clone().json().then(function(d){
       if(d&&d.data&&d.data.length){
        var ts=Date.now();
        for(var k=0;k<d.data.length;k++){
         var img=d.data[k];
         var url=img.url||(img.b64_json?"data:image/png;base64,"+img.b64_json:"");
         if(url&&url.length>50)window.electronAPI.saveToCache({url:url,filename:"gen_"+ts+"_"+k+".png"});
        }
       }
      }).catch(function(){});
     }
     return r;
    });
   }  return of.apply(this,arguments);
 };
})(window.fetch);

// ===== 7. Blob tracking =====
var _b={},_c=URL.createObjectURL;
URL.createObjectURL=function(b){var u=_c.call(this,b);_b[u]=b;return u;};
var _r=URL.revokeObjectURL;
URL.revokeObjectURL=function(u){delete _b[u];_r.call(this,u);};

// ===== 9. Uploaded image base64 tracker =====
var _u=[];
var _uTimer=setInterval(function(){
  var imgs=document.querySelectorAll("img");
  for(var i=0;i<imgs.length;i++){
    var src=imgs[i].src;
    if(src&&src.indexOf("blob:")===0&&_b[src]&&!_u.some(function(e){return e.url===src})){
      (function(blobUrl){
        var blob=_b[blobUrl];
        var fr=new FileReader();
        fr.onload=function(){
          var b64=fr.result.replace(/^data:image\/[^;]+;base64,/,"");
          _u.push({url:blobUrl,base64:b64});
        };
        fr.readAsDataURL(blob);
      })(src);
    }
  }
},500);

var _ac=HTMLAnchorElement.prototype.click;
HTMLAnchorElement.prototype.click=function(){
 if(this.download&&this.href&&this.href.indexOf("blob:")===0&&_b[this.href]&&window.electronAPI&&window.electronAPI.downloadImage){
  var fn=this.download,b=_b[this.href],rd=new FileReader();
  rd.onload=function(e){window.electronAPI.downloadImage({url:e.target.result,filename:fn,downloadPath:""});};
  rd.readAsDataURL(b);
 }
 return _ac.call(this);
};

// ===== 8. Download progress =====
var _dlNode=null;
function _dlShow(t,d){
 if(!_dlNode){_dlNode=document.createElement("div");_dlNode.className="ps-dl-notice fixed bottom-4 left-1/2 -translate-x-1/2 z-[9999] bg-gray-900 text-white text-[11px] px-4 py-2.5 rounded-xl border border-white/10 shadow-2xl";document.body.appendChild(_dlNode);}
 _dlNode.textContent=t;_dlNode.style.opacity="1";
 clearTimeout(_dlNode._t);
 _dlNode._t=setTimeout(function(){_dlNode.style.opacity="0";_dlNode.style.transition="opacity 0.5s";setTimeout(function(){_dlNode.remove();_dlNode=null;},500);},d||5000);
}
var _dm=setInterval(function(){
 var btns=document.querySelectorAll("button");
 for(var i=0;i<btns.length;i++){
  var txt=btns[i].textContent||"";
  if(txt.indexOf("Downloading")>-1||txt.indexOf("下载中")>-1)_dlShow("Downloading...",8000);
  else if(txt.indexOf("已下载")>-1||txt.indexOf("Downloaded")>-1){var nums=txt.match(/\d+/g);if(nums&&nums.length>=2)_dlShow("完成: "+nums[1]+"/"+nums[0],5000);else _dlShow("完成!",4000);}
 }
},1000);

})();
</script>
